name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" -not -path "./dot_claude/*" -not -path "./.agents/*" \
            | xargs shellcheck

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Run test suite
        run: |
          chezmoi init --source=$PWD
          ./test-chezmoi.sh

      - name: Dry-run apply
        run: |
          chezmoi apply --dry-run --verbose --source=$PWD
